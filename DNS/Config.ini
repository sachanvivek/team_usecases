[llm]
# Provider: ollama or azure_foundry
provider = ollama
base_url = http://172.19.0.4:11434
model = deepseek-v3.1:671b-cloud
temperature = 0.3
max_tokens = 2048

[llm.azure_foundry]
endpoint = https://your-foundry-endpoint.azure.com
api_key = your-azure-foundry-api-key
model = gpt-4o
api_version = 2024-02-15-preview

[azure]
subscription_ids = ee43fc90-3743-4416-b125-2bbf485d758b
tenant_id = 
client_id = 
client_secret = 
resource_group = 

[azure_dns]
enabled = true
zones = example.com,internal.corp
poll_interval_seconds = 30

[local_dns_server]
# Internal BIND9 DNS server running in Azure
enabled = true
host = 172.19.0.6
ssh_user = linuxadmin
ssh_password = linuxadmin@123
ssh_port = 22
# BIND config paths on the server
bind_zone_dir = /var/lib/bind
bind_conf_local = /etc/bind/named.conf.local
# Zones this server is authoritative for (will be auto-created if missing)
authoritative_zones = example.com,internal.corp,mfg.tcs,mfgitis.tcs
# Allow dynamic updates from this host
allow_update_from = any

[dns_targets]
# DNS servers to monitor (includes local server)
servers = 172.19.0.6,8.8.8.8,8.8.4.4,1.1.1.1,168.63.129.16
test_domains = microsoft.com,azure.com,google.com
query_types = A,AAAA,MX,NS,SOA,TXT,CNAME

[agents]
enabled_agents = experience,request_handling,l2,anomaly,failure_prediction,misconfiguration,query_log,client_scoring,dashboard
analysis_interval_seconds = 60

[servicenow]
instance = https://dev187880.service-now.com
username = admin
password = wEA$up08pX=S
# CR settings
assignment_group = DNS
category = Network
subcategory = DNS
cr_type = normal
# Polling interval for CR approval status (seconds)
approval_poll_interval = 30

[dns_management]
# Internal DNS zones managed via local BIND server at 172.19.0.6
managed_zones = example.com,internal.corp,mfg.tcs,mfgitis.tcs
# Backend: local_bind or azure_dns
default_backend = local_bind
# Allow auto-implementation after CR approval
auto_implement = true
# Auto-approve CRs in ServiceNow (true = skip manual approval, false = wait for manual approval)
auto_approve_cr = true
# Pre/Post check timeout (seconds)
check_timeout = 60

[remediation]
# Enable auto-remediation: agents detect issues -> auto-create CR -> auto-approve -> auto-fix -> auto-close
auto_remediation = true
# Auto-approve CRs created by remediation engine (skip manual approval)
auto_approve_cr = true
# Only auto-remediate these categories (incident = resolve incidents, change = execute DNS changes)
auto_categories = incident,change
# Max concurrent auto-remediations
max_concurrent = 3

[server]
host = 0.0.0.0
port = 5050
debug = true
