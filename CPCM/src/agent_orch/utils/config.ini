[SERVICENOW]
# ServiceNow incident integration
enabled = true
instance_url = https://dev187880.service-now.com/
username = admin
password = wEA$up08pX=S
api_path = /api/now/table/incident
verify_ssl = true
timeout = 30
default_caller = AMP

# Default incident fields
default_urgency = 3
default_impact = 3
default_category = Hardware
default_subcategory = CPU
default_assignment_group = CPCM
default_cmdb_ci =

# Post-resize update behavior
auto_resolve_on_success = true
resolved_state = 7
in_progress_state = 2
default_close_code = Resolved by caller
default_close_notes = Resolution notes

# Resolution field mappings
resolution_code_field = close_code
default_resolution_code = Resolved by caller
resolution_notes_field = resolution_notes
default_resolution_notes = Resolution notes
resolution_state = 7

[SERVICENOW_CHANGE_REQUEST]
# Change Request integration for VM resize operations
api_path = /api/now/table/change_request
default_type = normal
default_risk = moderate
default_impact = 3
default_priority = 3
default_category = Hardware
default_assignment_group = CPCM
default_requested_by = AMP
default_cmdb_ci =

# Change Request state mapping
state_new = -5
state_assess = -4
state_authorize = -3
state_scheduled = -2
state_implement = -1
state_review = 0
state_closed = 3
state_cancelled = 4

# Post-resize Change Request behavior
auto_close_on_success = true
default_close_code = successful
default_close_notes = VM resize completed successfully by automated agent.

# Approval polling settings
# poll_interval: seconds between each check (default 30)
# poll_timeout: max seconds to wait for approval (default 3600 = 1 hour)
approval_poll_interval = 30
approval_poll_timeout = 3600

[HYPERV]
# Hyper-V host connection details
host = 172.19.0.10
username = winadmin
password = winadmin@1234
# Default RAM in MB to set on resize
default_ram_mb = 1024

