[general]
app_name = Certificate Lifecycle Manager
app_version = 2.0
company_name = Enterprise Corp

[database]
path = data/certificates.db

[ollama]
base_url = http://172.19.0.4:11434
model = deepseek-v3.1:671b-cloud
timeout = 120
temperature = 0.7
max_tokens = 2048

[local_ca]
ca_name = Enterprise Internal CA
ca_org = Enterprise Corp
ca_country = IN
ca_state = Tamil Nadu
ca_city = Chennai
ca_validity_days = 3650
cert_validity_days = 365
key_size = 2048

[external_ca]
default_provider = DigiCert
providers = DigiCert,Sectigo,GlobalSign,GoDaddy,Lets Encrypt

[payment]
currency = USD
tax_rate = 0.08
enable_purchase_order = true
enable_credit_card = true
enable_wire_transfer = true

[discovery]
scan_timeout = 5
default_ports = 443,8443,8080,993,995,587,465
scan_threads = 10

[deployment]
ssh_timeout = 30
supported_platforms = Apache,Nginx,IIS,Tomcat,AWS,Azure,Kubernetes

[monitoring]
warning_days = 30
critical_days = 7
check_interval_hours = 24

[workflow]
require_approval = true
auto_approve_renewals = false
require_payment_for_external = true


[azure]
subscription_ids = 
tenant_id = 
client_id = 
client_secret = 
resource_group = MFG_ITIS_ITOPS_EntNetworks
